name: Build and Publish PDF

on:
  push:
    branches: [main]

jobs:
  docker_changes:
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      full_image: ${{ steps.get_image.outputs.full_image }}

    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: 'main'
          filters: |
            docker:
              - 'Dockerfile'

      - name: Set full image name
        id: get_image
        run: |
          echo "full_image=ghcr.io/${OWNER,,}/1-xetex-compiler:latest" >> $GITHUB_OUTPUT
        env:
          OWNER: '${{ github.repository_owner }}'

  build_docker:
    needs: docker_changes
    if: needs.docker_changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ needs.docker_changes.outputs.full_image }}

  build_pdf:
    needs: [docker_changes, build_docker]
    if: always() && (needs.build_docker.result == 'success' || needs.build_docker.result == 'skipped')
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.docker_changes.outputs.full_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Compile PDF
        run: |
          make clean
          make pdf

      - name: Prepare Pages Upload
        run: |
          mkdir -p public
          cp report/main.pdf public/report.pdf
          cat <<EOF > public/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>PDF Report</title>
            <style>
              body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; }
              iframe { width: 100%; height: 100%; border: none; display: block; }
            </style>
          </head>
          <body>
            <iframe src="report.pdf#view=FitH" type="application/pdf">
              <p>Your browser does not support iframes. <a href="report.pdf">Click here to view the PDF.</a></p>
            </iframe>
          </body>
          </html>
          EOF

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    needs: build_pdf
    if: always() && needs.build_pdf.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4