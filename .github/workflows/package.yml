name: Update Docker Image

on:
  push:
    branches: [dev]

jobs:
  docker_changes:
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      full_image: ${{ steps.get_image.outputs.full_image }}

    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: 'dev'
          filters: |
            docker:
              - 'Dockerfile'

      - name: Set full image name
        id: get_image
        run: |
          echo "full_image=ghcr.io/${OWNER,,}/1-xetex-compiler:dev" >> $GITHUB_OUTPUT
        env:
          OWNER: '${{ github.repository_owner }}'

  build_docker:
    needs: docker_changes
    if: needs.docker_changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ needs.docker_changes.outputs.full_image }}